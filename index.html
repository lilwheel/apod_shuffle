document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    // Per-page prep: substitute UUIDs, strip SRI/crossorigin (blob URLs from a
    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.
    function resourcesFor(id) {
      var map = {};
      var list = extResources[id] || [];
      for (var k = 0; k < list.length; k++) {
        if (blobUrls[list[k].uuid]) map[list[k].id] = blobUrls[list[k].uuid];
      }
      return map;
    }
    for (const id of pageIds) {
      let t = pages[id];
      for (const uuid of uuids) t = t.split(uuid).join(blobUrls[uuid]);
      t = t.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.
      // composedPath + getAttribute('target') handle SVG <a> and shadow-DOM
      // anchors, which closest()/IDL .target get wrong.
      var headContent = 'window.__resources = ' + JSON.stringify(resourcesFor(id)) + ';' +
        (pageIds.length > 1 ?

          'document.addEventListener("click", function(e){' +
            'if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.defaultPrevented) return;' +
            'var a = null, p = e.composedPath ? e.composedPath() : [e.target];' +

            '}' +
            'if (!a && e.target.closest) a = e.target.closest("a, area");' +
            'if (!a || a.hasAttribute("download")) return;' +
            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +
            'var h = a.getAttribute("href") || a.getAttribute("xlink:href");' +
            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +
              'if (!tg) { var b = document.querySelector("base[target]"); if (b && b.getAttribute("target") !== "_self") return; }' +
              'e.preventDefault();' +
              'if (/^(?:[a-z][a-z0-9+.-]*:|\\/\\/)/i.test(h)) parent.location.assign(h);' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');
      // Defuse any script end-tag sequence in the content (resource ids, page
      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.
      var headOpen = t.match(/<head[^>]*>/i);
      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).
      var template = pages[entryId];
      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <div style=\"width:430px;max-width:90vw;background:rgba(13,15,23,0.96);border:1px solid rgba(255,255,255,0.12);border-radius:18px;padding:28px;box-shadow:0 30px 90px rgba(0,0,0,0.6);\">\n        <div style=\"font-family:'Newsreader',serif;font-size:24px;margin-bottom:8px;\">NASA API key<\u002Fdiv>\n        <p style=\"font-family:'IBM Plex Sans',sans-serif;font-size:13px;line-height:1.6;color:rgba(238,241,246,0.62);margin:0 0 18px;\">The shared demo key is rate-limited. Grab a free personal key at <a href=\"https://api.nasa.gov\" target=\"_blank\" rel=\"noopener\" style=\"color:var(--accent);text-decoration:none;\">api.nasa.gov<\u002Fa> for unlimited shuffling — it stays on this device only.<\u002Fp>\n        <input value=\"{{ keyInput }}\" onchange=\"{{ setKeyInput }}\" placeholder=\"Paste your API key\" style=\"width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.14);border-radius:10px;padding:13px 14px;color:#eef1f6;font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:0.5px;outline:none;margin-bottom:16px;\">\n        <div style=\"display:flex;align-items:center;gap:10px;justify-content:flex-end;\">\n          <button onclick=\"{{ useDemo }}\" style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:2px;text-transform:uppercase;color:rgba(238,241,246,0.6);background:none;border:none;cursor:pointer;padding:11px 8px;\">Use demo key<\u002Fbutton>\n          <button onclick=\"{{ closeKey }}\" style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:2px;text-transform:uppercase;color:#eef1f6;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:999px;cursor:pointer;padding:11px 17px;\">Cancel<\u002Fbutton>\n          <button onclick=\"{{ saveKey }}\" style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:2px;text-transform:uppercase;color:#04101f;background:var(--accent);border:none;border-radius:999px;cursor:pointer;padding:11px 19px;font-weight:500;\">Save key<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ hasError }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:absolute;bottom:118px;left:50%;transform:translateX(-50%);z-index:40;display:flex;align-items:center;gap:16px;background:rgba(28,16,16,0.92);border:1px solid rgba(255,120,100,0.32);border-radius:12px;padding:13px 18px;backdrop-filter:blur(16px);box-shadow:0 16px 50px rgba(0,0,0,0.5);max-width:90vw;\">\n      <span style=\"font-family:'IBM Plex Sans',sans-serif;font-size:13px;color:#ffdcd6;\">{{ errMsg }}<\u002Fspan>\n      <button onclick=\"{{ openKey }}\" style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#fff;background:rgba(255,255,255,0.12);border:none;border-radius:999px;padding:7px 13px;cursor:pointer;white-space:nowrap;\">Add key<\u002Fbutton>\n      <button onclick=\"{{ dismissErr }}\" style=\"background:none;border:none;color:rgba(255,220,214,0.7);font-size:18px;line-height:1;cursor:pointer;padding:0 2px;\">×<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;},&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#4d9fff&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;imageFit&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;cover&quot;,&quot;contain&quot;],&quot;default&quot;:&quot;cover&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;qualityFilter&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Fill 1080p (strict)&quot;,&quot;Longest ≥ 1920&quot;,&quot;Any image&quot;],&quot;default&quot;:&quot;Fill 1080p (strict)&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;skipDiagrams&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;maxTextWords&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:5,&quot;min&quot;:2,&quot;max&quot;:30,&quot;tsType&quot;:&quot;number&quot;},&quot;libraryUrl&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  state = { current:null, loading:true, error:null, expanded:false, showKey:false, menuOpen:false, downloading:'', keyInput:'', vw:(typeof window!=='undefined'?window.innerWidth:1280) };\n\n  componentDidMount(){\n    this.API='https://api.nasa.gov/planetary/apod';\n    this.pool=[]; this.poolIdx=0; this.history=[]; this.histIdx=-1;\n    this.seen=new Set(); this.colorCache={}; this._colorP={}; this.textCache={}; this._textP={}; this.ocrWorker=null; this.currentColor=null;\n    this.netMode='auto'; this.usingCatalog=false;\n    this.fallback=[\n      {date:'2024-04-08', title:'The Changing Ion Tail of Comet Pons-Brooks', copyright:'Shengyu Li & Shaining', hdurl:'https://apod.nasa.gov/apod/image/2404/Comet12pTails_ShengyuLi_3000.jpg', media_type:'image', explanation:\"How does a comet tail change? It depends on the comet. The ion tail of Comet 12P/Pons\\u2013Brooks has been changing markedly, as detailed in this image sequenced over nine days from March 6 to 14. On some days the comet's ion tail was relatively long and complex, shaped by the ever-changing wind from the Sun.\"},\n      {date:'2022-11-09', title:'The Asymmetric Nebula Surrounding Wolf-Rayet Star 18', copyright:'Alex Woronow', hdurl:'https://apod.nasa.gov/apod/image/2211/wr18_woronow_2048.jpg', media_type:'image', explanation:\"Why does the nebula around the star WR-18 shine brighter on one side? Also known as NGC 3199, this active star and its surrounding nebula lie about 12,000 light-years away toward the nautical southern constellation of Carina. The featured deep image has been highly detailed in the light of hydrogen, oxygen, and sulfur.\"},\n      {date:'2023-08-30', title:'Full Moons of August', copyright:'Gianni Tumino', hdurl:'https://apod.nasa.gov/apod/image/2308/GianniTumino_SturgeonMoon_Palette_JPG_LOGO_2048.jpg', media_type:'image', explanation:\"Near perigee, the closest point in its almost moonthly orbit, a Full Moon rose as the Sun set on August 1. Its brighter than average lunar disk was captured in this dramatic moonrise sequence over dense cloud banks along the eastern horizon from Ragusa, Sicily.\"}\n    ];\n    this.usingFallback=false;\n    this.library=null;\n    this.bakedLibrary='apod-catalog.json';\n    this.libraryUrl=this.props.libraryUrl||this.bakedLibrary;\n    this.bakedKey='W8ey86oe3GrsfSohn2XgB6xb9nn4v7L6e6ZfeBja';\n    let saved=null; try{ saved=localStorage.getItem('apod_key'); }catch(e){}\n    this.apiKey=saved||this.bakedKey||'DEMO_KEY';\n    const fmt=d=>{const p=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;};\n    const now=new Date();\n    this.today=fmt(now);\n    this.recentStart=fmt(new Date(now.getTime()-45*864e5));\n    this._firstPaint=true;\n    this._resize=()=>{ clearTimeout(this._rzT); this._rzT=setTimeout(()=>this.setState({vw:window.innerWidth}),120); };\n    window.addEventListener('resize',this._resize);\n    this._key=(e)=>{\n      const t=(e.target&&e.target.tagName)||'';\n      if(t==='INPUT'||t==='TEXTAREA') return;\n      if(this.state.showKey) return;\n      if(e.code==='Space'){ e.preventDefault(); this.shuffle(); }\n      else if(e.key==='ArrowLeft'){ this.prev(); }\n      else if(e.key==='ArrowRight'){ this.next(); }\n    };\n    window.addEventListener('keydown',this._key);\n    this.boot();\n  }\n  componentWillUnmount(){ if(this._key) window.removeEventListener('keydown',this._key); if(this._resize) window.removeEventListener('resize',this._resize); clearTimeout(this._rzT); }\n\n  async boot(){\n    if(this.skipDiag()) this.ensureOCR().catch(()=>{});\n    await this.loadLibrary();\n    if(this.library && this.library.length){ this.usingCatalog=true; this.refillCatalog(); await this.shuffle(); return; }\n    await this.fetchPool(); await this.shuffle();\n  }\n\n  recencyShuffle(arr){ const now=Date.now(); return arr.map(e=>{ const t=Date.parse(e.date)||0; const age=(now-t)/3.156e10; const w= age<1?40 : age<3?16 : age<6?8 : age<12?3 : 1; return {e,k:Math.pow(Math.random(),1/w)}; }).sort((a,b)=>b.k-a.k).map(x=>x.e); }\n\n  refillCatalog(){ let src=this.library.filter(i=>!this.seen.has(i.date)); if(!src.length){ this.seen=new Set(); src=this.library.slice(); } this.pool=this.recencyShuffle(src); this.poolIdx=0; }\n\n  tryFetch(u,ms){\n    return new Promise((res,rej)=>{\n      const c=new AbortController();\n      const id=setTimeout(()=>{ c.abort(); },ms);\n      fetch(u,{signal:c.signal}).then(async r=>{\n        clearTimeout(id);\n        if(r.status===429){ rej({rate:true}); return; }\n        if(!r.ok){ rej({http:r.status}); return; }\n        const t=await r.text();\n        let j; try{ j=JSON.parse(t); }catch(e){ rej({parse:true}); return; }\n        res(j);\n      }).catch(e=>{ clearTimeout(id); rej(e); });\n    });\n  }\n\n  async apiGet(qs){\n    const direct=`${this.API}?${qs}`;\n    const proxied=`https://test.cors.workers.dev/?${direct}`;\n    if(this.netMode==='proxy') return await this.tryFetch(proxied,13000);\n    try{ const j=await this.tryFetch(direct,5500); this.netMode='direct'; return j; }\n    catch(e){ if(e&&e.rate) throw e; this.netMode='proxy'; return await this.tryFetch(proxied,13000); }\n  }\n\n  async fetchPool(){\n    try{\n      const k=this.apiKey;\n      const demo = k==='DEMO_KEY';\n      const qss = demo\n        ? [ `api_key=${k}&count=30` ]\n        : [ `api_key=${k}&start_date=${this.recentStart}&end_date=${this.today}`, `api_key=${k}&count=25` ];\n      const res=await Promise.all(qss.map(q=>this.apiGet(q).catch(e=>({__err:e}))));\n      let items=[], any=false, limited=false;\n
